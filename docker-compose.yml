services:
  postgres:
    image: postgres:16-alpine
    container_name: taller-mecanico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taller_mecanico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: taller-mecanico-pgadmin
    user: root
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taller.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
